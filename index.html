<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Is Being Built</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --orange: #ffa657;
      --tag-bg: #21262d;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }
    header h1 span { color: var(--accent); }

    #last-updated {
      font-size: 12px;
      color: var(--text-muted);
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 32px;
    }

    /* ── Summary bar ─────────────────────────────────────────── */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      text-align: center;
    }
    .stat-card .num {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
      display: block;
    }
    .stat-card .label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── Section titles ──────────────────────────────────────── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin: 32px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Alerts row ──────────────────────────────────────────── */
    .alerts-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 8px;
    }

    .alert-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid;
    }
    .alert-chip.dormant {
      background: rgba(210, 153, 34, .12);
      border-color: var(--yellow);
      color: var(--yellow);
    }
    .alert-chip.new-release {
      background: rgba(63, 185, 80, .12);
      border-color: var(--green);
      color: var(--green);
    }
    .alert-chip.active {
      background: rgba(88, 166, 255, .12);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Repo grid ───────────────────────────────────────────── */
    .repo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(580px, 1fr));
      gap: 20px;
    }

    @media (max-width: 700px) {
      .repo-grid { grid-template-columns: 1fr; }
      .container { padding: 16px; }
    }

    .repo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color .15s;
    }
    .repo-card:hover { border-color: var(--accent); }
    .repo-card.dormant-revived { border-color: var(--yellow); }

    .card-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .repo-name {
      font-size: 16px;
      font-weight: 600;
    }
    .repo-name a {
      color: var(--accent);
      text-decoration: none;
    }
    .repo-name a:hover { text-decoration: underline; }

    .repo-owner {
      font-size: 13px;
      color: var(--text-muted);
    }

    .badge-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
      align-items: center;
    }

    .badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      border: 1px solid var(--border);
      color: var(--text-muted);
      white-space: nowrap;
    }
    .badge.lang { border-color: var(--purple); color: var(--purple); }
    .badge.stars { border-color: var(--yellow); color: var(--yellow); }
    .badge.forks { border-color: var(--text-muted); }
    .badge.issues { border-color: var(--red); color: var(--red); }
    .badge.topic { background: var(--tag-bg); }

    .dormant-badge {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 12px;
      background: rgba(210, 153, 34, .15);
      border: 1px solid var(--yellow);
      color: var(--yellow);
      font-weight: 600;
    }

    .card-body {
      padding: 16px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── AI Summary ──────────────────────────────────────────── */
    .summary-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.7;
    }
    .summary-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent);
      margin-bottom: 5px;
    }

    /* ── Activity bar ────────────────────────────────────────── */
    .activity-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .activity-stat {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      text-align: center;
    }
    .activity-stat .n {
      font-size: 20px;
      font-weight: 700;
      display: block;
    }
    .activity-stat .n.hot { color: var(--orange); }
    .activity-stat .n.warm { color: var(--yellow); }
    .activity-stat .n.cool { color: var(--text-muted); }
    .activity-stat .lbl {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Tabs ────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      padding: 6px 14px;
      transition: color .15s, border-color .15s;
      font-family: var(--font);
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-btn:hover { color: var(--text); }

    .tab-panel { display: none; padding-top: 10px; }
    .tab-panel.active { display: block; }

    /* ── Commit list ─────────────────────────────────────────── */
    .commit-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .commit-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 13px;
    }
    .commit-sha {
      font-family: monospace;
      font-size: 12px;
      color: var(--accent);
      white-space: nowrap;
      text-decoration: none;
      min-width: 52px;
    }
    .commit-sha:hover { text-decoration: underline; }
    .commit-msg {
      flex: 1;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .commit-meta {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── Releases ────────────────────────────────────────────── */
    .release-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .release-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }
    .release-tag {
      font-family: monospace;
      font-size: 12px;
      color: var(--green);
      font-weight: 600;
      text-decoration: none;
    }
    .release-tag:hover { text-decoration: underline; }
    .release-name { flex: 1; color: var(--text); }
    .release-date { font-size: 11px; color: var(--text-muted); }

    /* ── Issues ──────────────────────────────────────────────── */
    .issue-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .issue-item {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      font-size: 13px;
    }
    .issue-num {
      color: var(--text-muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .issue-title {
      flex: 1;
      color: var(--text);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .issue-title:hover { color: var(--accent); }
    .issue-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

    /* ── Contributors ────────────────────────────────────────── */
    .contributors-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .contributor {
      display: flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      color: var(--text);
      font-size: 13px;
    }
    .contributor img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 1px solid var(--border);
    }
    .contributor:hover .clogin { color: var(--accent); }
    .contributor .contrib-n {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 13px;
      padding: 6px 0;
    }

    /* ── Daily digest ────────────────────────────────────────── */
    .digest-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 8px;
    }
    .digest-card h3 {
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--text);
    }
    .digest-entry {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .digest-entry:last-child { border-bottom: none; }
    .digest-repo {
      font-weight: 600;
      color: var(--accent);
      min-width: 150px;
      font-size: 13px;
    }
    .digest-text {
      flex: 1;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Filter/search bar ───────────────────────────────────── */
    .toolbar {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 7px 12px;
      outline: none;
      width: 240px;
      font-family: var(--font);
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      padding: 7px 14px;
      font-family: var(--font);
      transition: border-color .15s, color .15s;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    footer {
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 12px;
      margin-top: 48px;
      padding: 20px 32px;
      text-align: center;
    }

    #loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 16px;
    }

    #error-msg {
      display: none;
      background: rgba(248, 81, 73, .12);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      color: var(--red);
      padding: 16px 20px;
      margin: 20px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>What Is <span>Being Built</span></h1>
  <div id="last-updated">Loading...</div>
</header>

<div class="container">
  <div id="loading">Fetching community activity data...</div>
  <div id="error-msg"></div>
  <div id="app" style="display:none">

    <!-- Summary stats -->
    <div class="summary-bar" id="summary-bar"></div>

    <!-- Alerts -->
    <div class="section-title">Highlights</div>
    <div class="alerts-row" id="alerts-row"></div>

    <!-- Daily digest -->
    <div class="section-title">Today's Digest</div>
    <div class="digest-card">
      <h3>Activity in the last 24 hours</h3>
      <div id="digest-body"></div>
    </div>

    <!-- Toolbar -->
    <div class="section-title">All Repositories</div>
    <div class="toolbar">
      <input type="text" class="search-input" id="search-input" placeholder="Filter repos..." />
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active (7d)</button>
      <button class="filter-btn" data-filter="dormant-revived">Dormant &amp; Revived</button>
    </div>

    <!-- Repo cards -->
    <div class="repo-grid" id="repo-grid"></div>

  </div>
</div>

<footer>
  Data refreshed daily via GitHub Actions &bull; Summaries by <a href="https://groq.com" style="color:var(--accent)">Groq</a> (llama-3.3-70b-versatile) &bull; <a href="repos.json" style="color:var(--accent)">repos.json</a>
</footer>

<script>
const DATA_URL = "data/activity.json";

async function loadData() {
  const r = await fetch(DATA_URL + "?t=" + Date.now());
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function relativeDate(isoStr) {
  if (!isoStr) return "unknown";
  const d = new Date(isoStr);
  const diff = (Date.now() - d) / 1000;
  if (diff < 60) return "just now";
  if (diff < 3600) return `${Math.round(diff/60)}m ago`;
  if (diff < 86400) return `${Math.round(diff/3600)}h ago`;
  if (diff < 86400*7) return `${Math.round(diff/86400)}d ago`;
  if (diff < 86400*30) return `${Math.round(diff/86400/7)}w ago`;
  return `${Math.round(diff/86400/30)}mo ago`;
}

function escHtml(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

function buildSummaryBar(repos) {
  const totalCommits30 = repos.reduce((s, r) => s + r.commits_30d, 0);
  const totalCommits7 = repos.reduce((s, r) => s + r.commits_7d, 0);
  const totalCommits1 = repos.reduce((s, r) => s + r.commits_1d, 0);
  const activeRepos = repos.filter(r => r.commits_7d > 0).length;
  const dormantRevived = repos.filter(r => r.dormant_revived).length;
  const totalStars = repos.reduce((s, r) => s + r.stars, 0);

  const stats = [
    { num: repos.length, label: "Tracked Repos" },
    { num: activeRepos, label: "Active This Week" },
    { num: totalCommits1, label: "Commits Today" },
    { num: totalCommits7, label: "Commits (7d)" },
    { num: totalCommits30, label: "Commits (30d)" },
    { num: dormantRevived, label: "Dormant Revived" },
    { num: totalStars, label: "Total Stars" },
  ];

  return stats.map(s => `
    <div class="stat-card">
      <span class="num">${s.num}</span>
      <span class="label">${s.label}</span>
    </div>
  `).join("");
}

function buildAlerts(repos) {
  const chips = [];
  repos.filter(r => r.dormant_revived).forEach(r => {
    chips.push(`<span class="alert-chip dormant">&#9888; ${escHtml(r.repo)} — dormant, now active</span>`);
  });
  repos.filter(r => r.releases && r.releases.length && r.releases[0].date >= tenDaysAgo()).forEach(r => {
    chips.push(`<span class="alert-chip new-release">&#10003; ${escHtml(r.repo)} released ${escHtml(r.releases[0].tag)}</span>`);
  });
  repos.filter(r => r.commits_1d > 0).forEach(r => {
    chips.push(`<span class="alert-chip active">&#9679; ${escHtml(r.repo)}: ${r.commits_1d} commit${r.commits_1d !== 1 ? "s" : ""} today</span>`);
  });
  if (!chips.length) chips.push(`<span class="alert-chip" style="border-color:var(--text-muted);color:var(--text-muted)">No notable activity in the last 24 hours</span>`);
  return chips.join("");
}

function tenDaysAgo() {
  const d = new Date();
  d.setDate(d.getDate() - 10);
  return d.toISOString().slice(0, 10);
}

function buildDigest(repos) {
  const active = repos.filter(r => r.commits_1d > 0 || (r.releases && r.releases[0] && r.releases[0].date === new Date().toISOString().slice(0,10)));
  if (!active.length) {
    return `<div class="empty">No commits or releases detected in the last 24 hours.</div>`;
  }
  return active.map(r => {
    const latestCommits = r.recent_commits.filter(c => c.date === new Date().toISOString().slice(0,10));
    const snippets = latestCommits.slice(0,3).map(c => `<code style="font-size:11px;color:var(--text-muted)">${escHtml(c.sha)}</code> ${escHtml(c.message)}`).join("<br>");
    return `
      <div class="digest-entry">
        <div class="digest-repo"><a href="${escHtml(r.url)}" target="_blank" style="color:inherit;text-decoration:none">${escHtml(r.repo)}</a></div>
        <div class="digest-text">${snippets || `${r.commits_1d} commits today`}</div>
      </div>
    `;
  }).join("");
}

function tabId(repo, name) {
  return `tab-${repo}-${name}`.replace(/[^a-z0-9-]/gi, "_");
}

function buildRepoCard(repo) {
  const dormantClass = repo.dormant_revived ? " dormant-revived" : "";
  const dormantBadge = repo.dormant_revived ? `<span class="dormant-badge">&#9888; Dormant Revived</span>` : "";
  const langBadge = repo.language ? `<span class="badge lang">${escHtml(repo.language)}</span>` : "";
  const starsBadge = `<span class="badge stars">&#9733; ${repo.stars}</span>`;
  const forksBadge = `<span class="badge forks">&#10234; ${repo.forks}</span>`;
  const issuesBadge = repo.open_issues_count > 0 ? `<span class="badge issues">&#9679; ${repo.open_issues_count} issues</span>` : "";
  const topicBadges = (repo.topics || []).slice(0, 4).map(t => `<span class="badge topic">${escHtml(t)}</span>`).join("");

  const pushedText = repo.pushed_at ? `Last push: ${relativeDate(repo.pushed_at)}` : "";

  // Activity stats
  const c1Color = repo.commits_1d > 0 ? "hot" : "cool";
  const c7Color = repo.commits_7d > 5 ? "hot" : repo.commits_7d > 0 ? "warm" : "cool";
  const c30Color = repo.commits_30d > 20 ? "hot" : repo.commits_30d > 0 ? "warm" : "cool";

  // Tabs
  const tabPrefix = `${repo.owner}_${repo.repo}`.replace(/[^a-z0-9]/gi, "_");
  const tabs = ["Commits", "Releases", "Issues", "Contributors"];

  // Commit list
  const commitListHtml = repo.recent_commits.length
    ? `<ul class="commit-list">${repo.recent_commits.map(c => `
        <li class="commit-item">
          <a class="commit-sha" href="${escHtml(c.url)}" target="_blank">${escHtml(c.sha)}</a>
          <span class="commit-msg" title="${escHtml(c.message)}">${escHtml(c.message)}</span>
          <span class="commit-meta">${escHtml(c.date)}</span>
        </li>`).join("")}</ul>`
    : `<div class="empty">No recent commits found.</div>`;

  // Releases list
  const releasesHtml = repo.releases && repo.releases.length
    ? `<ul class="release-list">${repo.releases.map(rel => `
        <li class="release-item">
          <a class="release-tag" href="${escHtml(rel.url)}" target="_blank">${escHtml(rel.tag)}</a>
          <span class="release-name">${escHtml(rel.name)}</span>
          <span class="release-date">${escHtml(rel.date)}</span>
        </li>`).join("")}</ul>`
    : `<div class="empty">No releases found.</div>`;

  // Issues list
  const issuesHtml = repo.open_issues && repo.open_issues.length
    ? `<ul class="issue-list">${repo.open_issues.map(i => `
        <li class="issue-item">
          <span class="issue-num">#${i.number}</span>
          <a class="issue-title" href="${escHtml(i.url)}" target="_blank" title="${escHtml(i.title)}">${escHtml(i.title)}</a>
          <span class="issue-date">${escHtml(i.updated_at)}</span>
        </li>`).join("")}</ul>`
    : `<div class="empty">No open issues.</div>`;

  // Contributors
  const contribHtml = repo.contributors && repo.contributors.length
    ? `<div class="contributors-row">${repo.contributors.map(c => `
        <a class="contributor" href="${escHtml(c.html_url)}" target="_blank">
          <img src="${escHtml(c.avatar_url)}" alt="${escHtml(c.login)}" />
          <span class="clogin">${escHtml(c.login)}</span>
          <span class="contrib-n">${c.contributions}</span>
        </a>`).join("")}</div>`
    : `<div class="empty">No contributor data.</div>`;

  const tabPanels = [commitListHtml, releasesHtml, issuesHtml, contribHtml];

  return `
<div class="repo-card${dormantClass}" data-repo="${escHtml(repo.repo)}" data-owner="${escHtml(repo.owner)}" data-commits7="${repo.commits_7d}" data-dormant="${repo.dormant_revived}">
  <div class="card-header">
    <div>
      <div class="repo-owner">${escHtml(repo.owner)} / </div>
      <div class="repo-name"><a href="${escHtml(repo.url)}" target="_blank">${escHtml(repo.repo)}</a></div>
      <div class="badge-row">
        ${langBadge}${starsBadge}${forksBadge}${issuesBadge}${topicBadges}
      </div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      ${dormantBadge}
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px">${pushedText}</div>
    </div>
  </div>
  <div class="card-body">
    ${repo.description ? `<div style="color:var(--text-muted);font-size:13px">${escHtml(repo.description)}</div>` : ""}

    <div class="activity-row">
      <div class="activity-stat">
        <span class="n ${c1Color}">${repo.commits_1d}</span>
        <span class="lbl">Commits today</span>
      </div>
      <div class="activity-stat">
        <span class="n ${c7Color}">${repo.commits_7d}</span>
        <span class="lbl">This week</span>
      </div>
      <div class="activity-stat">
        <span class="n ${c30Color}">${repo.commits_30d}</span>
        <span class="lbl">This month</span>
      </div>
    </div>

    <div class="summary-box">
      <div class="summary-label">AI Summary (last 30 days)</div>
      ${escHtml(repo.summary)}
    </div>

    <div>
      <div class="tabs" id="tabs-${tabPrefix}">
        ${tabs.map((t, i) => `<button class="tab-btn${i===0?" active":""}" onclick="switchTab('${tabPrefix}',${i})">${t}</button>`).join("")}
      </div>
      ${tabPanels.map((html, i) => `<div class="tab-panel${i===0?" active":""}" id="panel-${tabPrefix}-${i}">${html}</div>`).join("")}
    </div>
  </div>
</div>`;
}

function switchTab(prefix, idx) {
  const tabContainer = document.getElementById(`tabs-${prefix}`);
  tabContainer.querySelectorAll(".tab-btn").forEach((b, i) => b.classList.toggle("active", i === idx));
  const panels = tabContainer.parentElement.querySelectorAll(".tab-panel");
  panels.forEach((p, i) => p.classList.toggle("active", i === idx));
}
window.switchTab = switchTab;

function applyFilters() {
  const query = document.getElementById("search-input").value.toLowerCase();
  const activeFilter = document.querySelector(".filter-btn.active")?.dataset.filter || "all";
  document.querySelectorAll(".repo-card").forEach(card => {
    const repo = card.dataset.repo.toLowerCase();
    const owner = card.dataset.owner.toLowerCase();
    const matchesSearch = !query || repo.includes(query) || owner.includes(query);
    const commits7 = parseInt(card.dataset.commits7 || "0", 10);
    const dormant = card.dataset.dormant === "true";
    let matchesFilter = true;
    if (activeFilter === "active") matchesFilter = commits7 > 0;
    if (activeFilter === "dormant-revived") matchesFilter = dormant;
    card.style.display = (matchesSearch && matchesFilter) ? "" : "none";
  });
}

async function init() {
  let data;
  try {
    data = await loadData();
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    const errDiv = document.getElementById("error-msg");
    errDiv.style.display = "block";
    errDiv.textContent = `Could not load activity data: ${e.message}. Run the fetch script or check GitHub Actions.`;
    return;
  }

  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";

  const repos = data.repos || [];
  const genAt = data.generated_at ? new Date(data.generated_at) : null;
  document.getElementById("last-updated").textContent = genAt
    ? `Updated ${relativeDate(genAt.toISOString())} (${genAt.toLocaleDateString()})`
    : "Update time unknown";

  document.getElementById("summary-bar").innerHTML = buildSummaryBar(repos);
  document.getElementById("alerts-row").innerHTML = buildAlerts(repos);
  document.getElementById("digest-body").innerHTML = buildDigest(repos);
  document.getElementById("repo-grid").innerHTML = repos.map(buildRepoCard).join("");

  // Filter buttons
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      applyFilters();
    });
  });

  document.getElementById("search-input").addEventListener("input", applyFilters);
}

init();
</script>
</body>
</html>
