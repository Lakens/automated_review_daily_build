name: Update Activity Data

on:
  schedule:
    # Run hourly; GitHub Actions schedules are best-effort and can be
    # delayed several hours under load, so a sparser cron compounds into
    # multi-hour gaps. The script itself is cheap to no-op (no new
    # commits => cached summary, no Groq call), so hourly ticks just
    # tighten the worst-case latency without meaningfully increasing cost.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "update-activity-data"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch activity data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/fetch_activity.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin main
          git stash list | grep -q . && git stash pop || true
          git add data/activity.json
          [ -f data/posts.json ] && git add data/posts.json || true
          [ -f feed.xml ] && git add feed.xml || true
          git diff --cached --quiet || git commit -m "chore: update activity data [$(date -u +%Y-%m-%d)]"
          git push
