name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # Pushes made with the default GITHUB_TOKEN (e.g. by the Update
    # Activity Data workflow) do not trigger other workflows' `push`
    # events, so this schedule is the actual mechanism that republishes
    # the site after each data update. Runs 15 min after the update
    # workflow's :00 schedule.
    - cron: "15 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
